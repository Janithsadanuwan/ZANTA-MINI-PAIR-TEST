<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANTA-MD | QR Pairing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; align-items: center; position: relative; }

        /* ✨ Light Blue Space Background */
        .stars-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; 
            background: radial-gradient(circle at center, #0a1a2d 0%, #000000 100%); 
        }
        .star { position: absolute; background: #b6e3ff; border-radius: 50%; opacity: 0.6; animation: move linear infinite; }
        @keyframes move { from { transform: translateY(100vh); opacity: 0; } to { transform: translateY(-10vh); opacity: 0.8; } }

        /* 💎 Ultra Glass Box */
        .glass-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 50px 30px;
            background: rgba(0, 212, 255, 0.03); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(182, 227, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 191, 255, 0.15);
            text-align: center;
            color: #fff;
        }

        h2 {
            font-size: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
            font-weight: 600;
        }

        p { font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 25px; }

        /* 🔳 QR Container */
        .qr-wrapper {
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.05);
            margin: 0 auto 25px auto;
            border-radius: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #qrImage {
            width: 100%;
            height: 100%;
            display: none; /* පස්සේ පෙන්වන්න */
            padding: 10px;
            background: #fff; /* QR එක පැහැදිලිව පෙනෙන්න */
        }

        /* 🌀 Loading Spinner */
        .loader {
            border: 4px solid rgba(0, 212, 255, 0.1);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🔘 Refresh Button */
        .btn-refresh {
            width: 100%;
            padding: 15px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
            text-transform: uppercase;
        }
        .btn-refresh:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.8rem;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
            opacity: 0.7;
        }
        .home-link:hover { opacity: 1; border-color: #00d4ff; }

    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="glass-box">
        <h2>ZANTA-MD</h2>
        <p>Scan the QR code to link your device</p>
        
        <div class="qr-wrapper" id="qrContainer">
            <div class="loader" id="loader"></div>
            <img src="" alt="QR Code" id="qrImage">
        </div>
        
        <button class="btn-refresh" onclick="loadQR()">Get New QR</button>
        
        <a href="index.html" class="home-link">← Back to Home</a>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/5zx7hg.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Stars Logic
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = Math.random() * 5 + 3 + 's';
            starsContainer.appendChild(star);
        }

        // QR Loading Logic
        async function loadQR() {
            const qrImage = document.getElementById('qrImage');
            const loader = document.getElementById('loader');
            
            // මුලින්ම පරණ එක අයින් කරලා Loader එක පෙන්වන්න
            qrImage.style.display = 'none';
            loader.style.display = 'block';

            try {
                // මෙතනට ඔයාගේ QR එක එන API Link එක දාන්න (උදාහරණයක් ලෙස /qr)
                const response = await fetch('/qr'); 
                const data = await response.json();
                
                if (data.qr) {
                    qrImage.src = data.qr; // API එකෙන් එන QR image link එක
                    qrImage.style.display = 'block';
                    loader.style.display = 'none';
                } else {
                    alert("Failed to load QR. Please try again.");
                }
            } catch (error) {
                console.error("Error loading QR:", error);
                // පරීක්ෂා කිරීම සඳහා (Testing only): Loader එක නවතා පණිවිඩයක් පෙන්වීමට
                loader.style.display = 'none';
            }
        }

        // පේජ් එක load වෙද්දීම QR එක ගන්න
        window.onload = loadQR;

        // Music Trigger
        window.addEventListener('click', () => {
            document.getElementById('bgMusic').play();
        }, { once: true });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANTA-MD | Connection Options</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #000; 
            min-height: 100vh; 
            overflow-x: hidden; 
            overflow-y: auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            padding: 40px 0;
        }

        /* ✨ Light Blue Space Background */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #0a1a2d 0%, #000000 100%);
        }

        .star {
            position: absolute;
            background: #b6e3ff;
            border-radius: 50%;
            opacity: 0.6;
            animation: move linear infinite;
        }

        @keyframes move {
            from { transform: translateY(100vh); opacity: 0; }
            to { transform: translateY(-10vh); opacity: 0.8; }
        }

        /* 💎 Main Glass Box */
        .glass-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 60px 20px 40px 20px;
            background: rgba(0, 212, 255, 0.03); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(182, 227, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 191, 255, 0.1);
            text-align: center;
            color: #fff;
            margin: auto;
        }

        .logo-container {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            padding: 5px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            overflow: hidden;
        }

        .logo-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        h2 { color: #00d4ff; margin-top: 10px; font-weight: 600; font-size: 1.8rem; }
        p { font-size: 0.85rem; margin-bottom: 25px; color: rgba(255, 255, 255, 0.6); }

        /* Ads Wrapper */
        .ads-wrapper {
            width: 100%;
            margin-bottom: 20px;
            min-height: 80px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .btn {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 30px;
            background: rgba(0, 212, 255, 0.1);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Auto-hover animation class */
        .btn:hover, .btn.auto-hover {
            background: #00d4ff;
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
            transform: scale(1.08);
            color: #000;
            font-weight: 600;
        }

        .back-link {
            margin-top: 25px;
            display: inline-block;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { color: #00d4ff; }

        .music-tag {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #00d4ff;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 600px) {
            body { align-items: flex-start; padding-top: 80px; }
            .glass-box { width: 95%; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="glass-box">
        <div class="logo-container">
            <img src="https://github.com/Akashkavindu/ZANTA_MD/blob/main/images/WhatsApp%20Image%202025-12-29%20at%209.28.43%20AM.jpeg?raw=true" alt="Logo">
        </div>

        <h2>Connection</h2>
        <p>SELECT YOUR METHOD</p>

        <div class="ads-wrapper">
            <script async="async" data-cfasync="false" src="https://pl28409004.effectivegatecpm.com/04fde588c8c3c4ebc19bb82d26eddcf6/invoke.js"></script>
            <div id="container-04fde588c8c3c4ebc19bb82d26eddcf6"></div>
        </div>

        <div class="btn-container">
            <a href="/pair-page" class="btn">Link with Pair Code</a>
            <a href="/qr-page" class="btn">Link with QR Code</a>
            
            <a href="https://github.com/Akashkavindu/ZANTA_MD" class="back-link">← GitHub Repository</a>
        </div>

        <div class="music-tag">🎵 Playing: Pal Pal...</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/5zx7hg.mp3" type="audio/mpeg">
    </audio>

    <script src="https://pl28408717.effectivegatecpm.com/00/6e/30/006e304b5ab96fb51a608263d55d1a7e.js"></script>

    <script>
        // 1. Stars Animation
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = Math.random() * 5 + 3 + 's';
            starsContainer.appendChild(star);
        }

        // 2. Auto Hover Animation for Buttons
        const mainButtons = document.querySelectorAll('.btn-container .btn');
        let currentIndex = 0;
        function autoHover() {
            mainButtons.forEach(btn => btn.classList.remove('auto-hover'));
            if(mainButtons[currentIndex]) mainButtons[currentIndex].classList.add('auto-hover');
            currentIndex = (currentIndex + 1) % mainButtons.length;
        }
        setInterval(autoHover, 2500);

        // 3. Play Music on first click
        window.addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            if (music.paused) music.play();
        }, { once: true });
    </script>

</body>
</html>
